name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-assets:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bin="matoi"
          target="${{ matrix.target }}"
          asset="${bin}-${version}-${target}"
          stable_asset="${bin}-${target}"

          mkdir -p dist
          cp "target/${target}/release/${bin}" "dist/${bin}"
          tar -C dist -czf "${asset}.tar.gz" "${bin}"
          cp "${asset}.tar.gz" "${stable_asset}.tar.gz"

          for f in "${asset}.tar.gz" "${stable_asset}.tar.gz"; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "${f}" > "${f}.sha256"
            else
              shasum -a 256 "${f}" > "${f}.sha256"
            fi
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.target }}
          if-no-files-found: error
          path: |
            *.tar.gz
            *.tar.gz.sha256

  publish-release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build-assets
    permissions:
      contents: write
    steps:
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.tar.gz.sha256
